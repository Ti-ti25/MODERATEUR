<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Panel de Modération</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0e14;
            --surface: #13151f;
            --border: #1e2130;
            --accent: #5865F2;
            --accent-hover: #4752c4;
            --text: #e8eaf0;
            --muted: #5a5f7a;
            --error: #ed4245;
            --success: #57f287;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Fond animé */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 20%, rgba(88,101,242,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 50% 60% at 80% 80%, rgba(88,101,242,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Grille décorative */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(88,101,242,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(88,101,242,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(88,101,242,0.1);
            animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .logo-text {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-family: 'DM Mono', monospace;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 10px;
        }

        h1 span {
            color: var(--accent);
        }

        .subtitle {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        /* Message d'erreur */
        .alert {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'DM Mono', monospace;
            margin-bottom: 24px;
            border: 1px solid;
        }

        .alert.error {
            background: rgba(237,66,69,0.1);
            border-color: rgba(237,66,69,0.3);
            color: var(--error);
        }

        .alert.show { display: flex; }

        /* Bouton Discord */
        .btn-discord {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-discord::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.2s;
        }

        .btn-discord:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(88,101,242,0.4);
        }

        .btn-discord:hover::before {
            background: rgba(255,255,255,0.05);
        }

        .btn-discord:active {
            transform: translateY(0);
        }

        .btn-discord svg {
            width: 22px;
            height: 22px;
            fill: white;
            flex-shrink: 0;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--muted);
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .info-box {
            background: rgba(88,101,242,0.07);
            border: 1px solid rgba(88,101,242,0.2);
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6;
            font-family: 'DM Mono', monospace;
        }

        .info-box strong {
            color: var(--text);
            display: block;
            margin-bottom: 4px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(88,101,242,0.15);
            border: 1px solid rgba(88,101,242,0.3);
            color: #a5adff;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'DM Mono', monospace;
            margin-top: 6px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">
        <div class="logo-icon">🛡️</div>
        <span class="logo-text">Panel Modération</span>
    </div>

    <h1>Accès <span>Restreint</span></h1>
    <p class="subtitle">Connecte-toi avec ton compte Discord pour accéder au panel de modération.</p>

    <!-- Message d'erreur dynamique -->
    <div class="alert error" id="alertBox">
        <span id="alertMsg">Accès refusé.</span>
    </div>

    <a href="/auth/discord" class="btn-discord">
        <!-- Logo Discord SVG officiel -->
        <svg viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg">
            <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
        </svg>
        Se connecter avec Discord
    </a>

    <div class="divider">accès limité</div>

    <div class="info-box">
        <strong>🔒 Rôle requis</strong>
        Seuls les membres avec le rôle suivant peuvent se connecter :
        <br>
        <span class="tag">⭐ * Modérateur [Discord]</span>
    </div>
</div>

<script>
    // Affichage des messages d'erreur selon le paramètre URL
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    const alertBox = document.getElementById('alertBox');
    const alertMsg = document.getElementById('alertMsg');

    const errors = {
        no_code: "Connexion annulée ou code manquant.",
        token_failed: "Échec de l'authentification Discord.",
        not_member: "Tu n'es pas membre du serveur Discord.",
        no_permission: "Tu n'as pas le rôle requis pour accéder au panel.",
        server_error: "Erreur serveur. Réessaie dans quelques instants."
    };

    if (error && errors[error]) {
        alertMsg.textContent = errors[error];
        alertBox.classList.add('show');
    }
</script>

</body>
</html>
