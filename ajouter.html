<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard - Ajouter une Sanction</title>
    <style>
        :root {
            --bg-main: #1e1f22;
            --bg-card: #2b2d31;
            --bg-input: #1e1f22;
            --text-main: #f2f3f5;
            --text-muted: #949ba4;
            --accent-color: #5865f2; /* Bleu */
            --border-radius: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 2rem; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .form-container { width: 100%; max-width: 550px; background-color: var(--bg-card); padding: 2.5rem; border-radius: var(--border-radius); box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        
        header { margin-bottom: 2rem; text-align: center; }
        h1 { font-size: 1.6rem; margin-bottom: 0.5rem; }
        h1 span { color: var(--accent-color); }
        
        /* Styles du formulaire */
        .form-group { margin-bottom: 1.5rem; display: flex; flex-direction: column; }
        label { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select, textarea {
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 1px solid #232428;
            padding: 0.8rem;
            border-radius: 4px;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--accent-color); }
        textarea { resize: vertical; min-height: 100px; }
        
        /* Groupe optionnel pour la durée du mute */
        #duration-group { display: flex; } /* Affiché par défaut car "Mute" est sélectionné au début */

        /* Boutons */
        .btn-group { display: flex; gap: 10px; margin-top: 2rem; }
        .btn { flex: 1; padding: 0.8rem; border-radius: var(--border-radius); border: none; font-weight: bold; cursor: pointer; font-size: 1rem; text-align: center; text-decoration: none; transition: opacity 0.2s; }
        .btn-submit { background-color: var(--accent-color); color: white; }
        .btn-cancel { background-color: #4e5058; color: white; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="form-container">
        <header>
            <h1>🛡️ Nouveau Dossier | <span>Sanction</span></h1>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Enregistrer une nouvelle action de modération</p>
        </header>

        <form>
            <div class="form-group">
                <label for="sanction-type">Type de Sanction</label>
                <select id="sanction-type" required>
                    <option value="mute">🔇 Mute</option>
                    <option value="warn">⚠️ Avertissement (Warn)</option>
                    <option value="ban">🔨 Bannissement (Ban)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="user-tag">Utilisateur (@pseudo)</label>
                <input type="text" id="user-tag" placeholder="Ex: @JeanFoutre" required>
            </div>

            <div class="form-group">
                <label for="user-id">ID Discord de la victime</label>
                <input type="text" id="user-id" placeholder="Ex: 282130541234567890" pattern="[0-9]{17,19}" title="Un ID Discord fait entre 17 et 19 chiffres" required>
            </div>

            <div class="form-group" id="duration-group">
                <label for="duration">Durée du Mute</label>
                <input type="text" id="duration" placeholder="Ex: 24 Heures, 7 Jours...">
            </div>

            <div class="form-group">
                <label for="reason">Raison détaillée</label>
                <textarea id="reason" placeholder="Explique précisément ce qu'il a fait..." required></textarea>
            </div>

            <div class="form-group">
                <label for="modo-tag">Ton Pseudo Modérateur</label>
                <input type="text" id="modo-tag" placeholder="Ex: @Alex_Modo" required>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-submit">Valider la sanction</button>
                <a href="index.html" class="btn btn-cancel">Annuler</a>
            </div>
        </form>
    </div>

    <script>
const typeSelect = document.getElementById('sanction-type');
const durationGroup = document.getElementById('duration-group');
const durationInput = document.getElementById('duration');
const form = document.querySelector('form');

// Gestionnaire d'affichage de la durée
typeSelect.addEventListener('change', () => {
    if (typeSelect.value === 'mute') {
        durationGroup.style.display = 'flex';
        durationInput.setAttribute('required', 'required');
    } else {
        durationGroup.style.display = 'none';
        durationInput.removeAttribute('required');
        durationInput.value = '';
    }
});

// ENVOI DES DONNÉES AU SERVEUR
form.addEventListener('submit', function(event) {
    event.preventDefault(); // On empêche le rechargement brutal de la page

    const data = {
        type: document.getElementById('sanction-type').value,
        username: document.getElementById('user-tag').value.trim(),
        user_id: document.getElementById('user-id').value.trim(),
        duration: document.getElementById('duration').value.trim(),
        reason: document.getElementById('reason').value.trim(),
        moderator: document.getElementById('modo-tag').value.trim()
    };

    fetch('/api/sanctions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(response => {
        if(response.success) {
            alert("Sanction enregistrée dans la base de données ! 🔗");
            // Redirection intelligente selon le type de sanction appliquée
            if(data.type === 'mute') window.location.href = "index.html";
            if(data.type === 'warn') window.location.href = "warns.html";
            if(data.type === 'ban') window.location.href = "bans.html";
        } else {
            alert("Erreur lors de l'enregistrement.");
        }
    })
    .catch(err => {
        console.error(err);
        alert("Impossible de contacter le serveur.");
    });
});
    </script>
</body>
</html>
