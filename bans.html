<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard - Bannissements</title>
    <style>
        :root {
            --bg-main: #1e1f22;
            --bg-card: #2b2d31;
            --bg-table-header: #111214;
            --text-main: #f2f3f5;
            --text-muted: #949ba4;
            --accent-color: #5865f2;
            --warning-color: #f0b232;
            --danger-color: #f23f43; /* Rouge Ban */
            --border-radius: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 2rem; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1200px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--bg-card); padding-bottom: 1rem; }
        h1 span { color: var(--danger-color); }

        .btn-action { color: white; border: none; padding: 0.6rem 1.2rem; border-radius: var(--border-radius); cursor: pointer; font-weight: bold; transition: opacity 0.2s ease; text-decoration: none; display: inline-block; }
        .btn-action:hover { opacity: 0.85; }
        .btn-ban { background-color: var(--danger-color); }

        .nav-tabs { display: flex; gap: 10px; margin-bottom: 1.5rem; }
        .tab-link { background-color: var(--bg-card); color: var(--text-muted); text-decoration: none; padding: 0.6rem 1.2rem; border-radius: var(--border-radius); font-weight: 600; font-size: 0.95rem; transition: all 0.2s ease; }
        .tab-link:hover { color: var(--text-main); background-color: #35373c; }
        .tab-link.active { background-color: var(--danger-color); color: white; }

        .table-responsive { background-color: var(--bg-card); border-radius: var(--border-radius); overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background-color: var(--bg-table-header); padding: 1rem; font-size: 0.9rem; text-transform: uppercase; }
        td { padding: 1rem; border-bottom: 1px solid #35373c; font-size: 0.95rem; }
        tr:last-child td { border-bottom: none; }
        .user-id { font-family: monospace; background-color: var(--bg-main); padding: 0.2rem 0.4rem; border-radius: 4px; color: var(--text-muted); }
        .badge-modo { background-color: rgba(255, 255, 255, 0.08); padding: 0.2rem 0.5rem; border-radius: 4px; }
        .date { color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🛡️ Staff Dashboard | <span>Bannissements</span></h1>
                <p style="color: var(--text-muted); margin-top: 0.3rem;">Liste définitive des membres bannis du serveur</p>
            </div>
        </header>

        <div class="nav-tabs">
            <a href="index.html" class="tab-link">🔇 Mutes</a>
            <a href="warns.html" class="tab-link">⚠️ Avertissements</a>
            <a href="bans.html" class="tab-link active">🔨 Bannissements</a>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Utilisateur</th>
                        <th>ID Discord</th>
                        <th>Raison du Ban</th>
                        <th>Modérateur</th>
                        <th>Date</th>
                        <th>Actions</th> </tr>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>@JeanFoutre</strong></td>
                        <td><span class="user-id">282130541234567890</span></td>
                        <td>Spam intensif de liens publicitaires et insultes en DM.</td>
                        <td><span class="badge-modo">@Alex_Modo</span></td>
                        <td class="date">04/06/2026</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
<script>
        function chargerBans() {
            fetch('/api/sanctions/bans')
                .then(res => res.json())
                .then(bans => {
                    const tbody = document.querySelector('tbody');
                    tbody.innerHTML = '';

                    if (bans.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--text-muted);">Aucun utilisateur banni. 🔨</td></tr>`;
                        return;
                    }

                    bans.forEach(ban => {
                        const dateFormatee = new Date(ban.date_added).toLocaleDateString('fr-FR');
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td><strong>${ban.username}</strong></td>
                            <td><span class="user-id">${ban.user_id}</span></td>
                            <td class="reason">${ban.reason}</td>
                            <td><span class="badge-modo">${ban.moderator}</span></td>
                            <td class="date">${dateFormatee}</td>
                            <td>
                                <button class="btn-action" style="background:#ff453a; padding:6px 12px; font-size:0.85rem; font-weight:bold; color:white; border:none; border-radius:4px; cursor:pointer;" onclick="supprimerSanction('bans', ${ban.id}, '${ban.username}')">Retirer ❌</button>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                })
                .catch(err => console.error("Erreur de chargement :", err));
        }

        function supprimerSanction(type, id, username) {
            if(confirm(`Voulez-vous vraiment débannir (unban) ${username} ?`)) {
                fetch(`/api/sanctions/${type}/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(() => chargerBans());
            }
        }

        document.addEventListener('DOMContentLoaded', chargerBans);
    </script>
</body>
</html>
